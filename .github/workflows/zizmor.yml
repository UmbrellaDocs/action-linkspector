name: zizmor
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  zizmor:
    name: runner / zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e #v0.5.3
